<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eye Disease Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <main class="page-wrap">
      <section class="hero card reveal">
        <p class="eyebrow">Deep Learning Project</p>
        <h1>Eye Disease Classification UI</h1>
        <p class="subtitle">
          Upload a retina/eye image. The model predicts one of these classes:
          Cataract, Diabetic Retinopathy, Glaucoma, or Normal.
        </p>
      </section>

      <section class="predictor-grid">
        <article class="card panel reveal delay-1">
          <h2>Upload Image</h2>
          <form id="predict-form">
            <label class="dropzone" for="image-input">
              <input id="image-input" name="image" type="file" accept="image/*" required />
              <span id="dropzone-title">Drop image here or click to browse</span>
              <small>Supported: png, jpg, jpeg, bmp, webp | Max 8 MB</small>
            </label>

            <div class="preview-wrap" id="preview-wrap" hidden>
              <img id="preview-image" alt="Selected image preview" />
            </div>

            <button id="predict-btn" type="submit">Predict Disease Class</button>
          </form>
        </article>

        <article class="card panel reveal delay-2">
          <h2>Prediction Output</h2>
          <div id="status" class="status">Waiting for image upload...</div>

          <div id="result" hidden>
            <div class="result-main">
              <p class="result-label">Predicted Class</p>
              <p id="predicted-class" class="predicted-class">-</p>
              <p id="confidence" class="confidence">Confidence: -</p>
            </div>

            <div>
              <p class="result-label">Class Probabilities</p>
              <div id="probability-list" class="probability-list"></div>
            </div>
          </div>
        </article>
      </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
